<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup - HomeFix</title>
    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="theme.css?v=4" />
  </head>
  <body>
    <main class="auth-page signup-page">
      <section class="auth-visual" aria-label="Create a HomeFix account">
        <a class="brand" href="index.html" aria-label="HomeFix home">
          <span class="brand-mark">HF</span>
          <span>HomeFix</span>
        </a>
        <div>
          <p class="eyebrow">Get started</p>
          <h1>Book reliable home services with a profile made for your household.</h1>
          <p>Create your account to save contact details, view booking history, and get faster service matches.</p>
        </div>
      </section>

      <section class="auth-panel">
        <form class="auth-form" id="signupForm" novalidate>
          <div class="form-heading">
            <p class="eyebrow">Signup</p>
            <h2>Create your account</h2>
          </div>

          <div class="field">
            <label for="signupName">Name</label>
            <input id="signupName" name="name" type="text" placeholder="Your full name" autocomplete="name" required minlength="2" />
            <small class="error-message"></small>
          </div>

          <div class="field">
            <label for="signupPhone">Phone</label>
            <input id="signupPhone" name="phone" type="tel" placeholder="10 digit phone number" autocomplete="tel" required />
            <small class="error-message"></small>
          </div>

          <div class="field">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
            <small class="error-message"></small>
          </div>

          <div class="field">
            <label for="signupPassword">Password</label>
            <input
              id="signupPassword"
              name="password"
              type="password"
              placeholder="At least 6 characters"
              autocomplete="new-password"
              required
              minlength="6"
            />
            <small class="error-message"></small>
          </div>

          <button class="auth-button" type="submit">Create Account</button>
          <p class="form-status" role="status" aria-live="polite"></p>

          <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
        </form>
      </section>
    </main>
    <footer class="auth-footer">
        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
        <a href="workers.html">Workers</a>
        <a href="profile.html">Profile</a>
    </footer>
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <script src="nav.js"></script>


    <script src="auth.js"></script>
  </body>
</html>
