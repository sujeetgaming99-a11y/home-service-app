<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - HomeFix</title>
    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="theme.css?v=4" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-visual" aria-label="HomeFix account access">
        <a class="brand" href="index.html" aria-label="HomeFix home">
          <span class="brand-mark">HF</span>
          <span>HomeFix</span>
        </a>
        <div>
          <p class="eyebrow">Welcome back</p>
          <h1>Manage bookings, experts, and service updates in one place.</h1>
          <p>Sign in to track appointments, confirm slots, and book trusted home services faster.</p>
        </div>
      </section>

      <section class="auth-panel">
        <form class="auth-form" id="loginForm" novalidate>
          <div class="form-heading">
            <p class="eyebrow">Login</p>
            <h2>Sign in to your account</h2>
          </div>

          <div class="field">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
            <small class="error-message"></small>
          </div>

          <div class="field">
            <label for="loginPassword">Password</label>
            <input
              id="loginPassword"
              name="password"
              type="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
              minlength="6"
            />
            <small class="error-message"></small>
          </div>

          <button class="auth-button" type="submit">Login</button>
          <p class="form-status" role="status" aria-live="polite"></p>

          <p class="auth-switch">New to HomeFix? <a href="signup.html">Create an account</a></p>
        </form>
      </section>
    </main>
    <footer class="auth-footer">
        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
        <a href="workers.html">Workers</a>
        <a href="profile.html">Profile</a>
    </footer>
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <script src="nav.js"></script>


    <script src="auth.js"></script>
  </body>
</html>
